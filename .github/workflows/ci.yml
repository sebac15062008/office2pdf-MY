name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

env:
  CARGO_TERM_COLOR: always

jobs:
  business-golden-contract:
    name: Business Golden Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Poppler
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Test business golden validator
        run: python3 -m unittest discover -s scripts/tests -p 'test_validate_business_golden_mocks.py'
      - name: Validate business golden corpus
        run: python3 scripts/validate_business_golden_mocks.py

  visual-pr-contract:
    name: Visual PR Contract
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Test visual PR validator
        run: python3 -m unittest discover -s scripts/tests -p 'test_check_visual_pr.py'
      - name: Validate visual PR contract
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          python3 scripts/check_visual_pr.py
          --event "${GITHUB_EVENT_PATH}"
          --base "${{ github.event.pull_request.base.sha }}"
          --head "${{ github.event.pull_request.head.sha }}"
          --repository "${{ github.repository }}"

  check:
    name: Check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, "1.89"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install qpdf
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y qpdf
      - run: cargo test --workspace
        env:
          OFFICE2PDF_VALIDATE_PDF: "1"

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  wasm-check:
    name: WASM Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm
      - run: cargo check --target wasm32-unknown-unknown -p office2pdf
      - run: cargo check --target wasm32-unknown-unknown -p office2pdf --features wasm
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      # Runs the wasm integration tests in src/wasm.rs under Node, exercising
      # the wasm32 time paths (Instant/SystemTime) end-to-end so the issue #178
      # class of runtime panic cannot regress unnoticed.
      - name: Run wasm tests in Node
        working-directory: crates/office2pdf
        run: wasm-pack test --node --features wasm

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  bulk-test:
    name: Bulk Third-Party Fixture Test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Compare fixture outcomes with baseline
        run: cargo test --release -p office2pdf --test bulk_conversion test_bulk_regression_gate -- --ignored --nocapture --exact
        env:
          BULK_REPORT_DIR: ${{ runner.temp }}/bulk-conversion
      - name: Upload bulk conversion reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bulk-conversion-report
          path: ${{ runner.temp }}/bulk-conversion
          if-no-files-found: warn
