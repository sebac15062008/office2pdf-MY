name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, "1.89"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install qpdf
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y qpdf
      - run: cargo test --workspace
        env:
          OFFICE2PDF_VALIDATE_PDF: "1"

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  wasm-check:
    name: WASM Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm
      - run: cargo check --target wasm32-unknown-unknown -p office2pdf
      - run: cargo check --target wasm32-unknown-unknown -p office2pdf --features wasm
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      # Runs the wasm integration tests in src/wasm.rs under Node, exercising
      # the wasm32 time paths (Instant/SystemTime) end-to-end so the issue #178
      # class of runtime panic cannot regress unnoticed.
      - name: Run wasm tests in Node
        working-directory: crates/office2pdf
        run: wasm-pack test --node --features wasm

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  bulk-test:
    name: Bulk Third-Party Fixture Test
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --release -p office2pdf --test bulk_conversion -- --ignored --nocapture
